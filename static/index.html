<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-hover: #2a2a2a;
      --border: #333;
      --text-primary: #e8e8e8;
      --text-secondary: #999;
      --accent: #7c5cfc;
      --accent-hover: #6a4ae0;
      --user-bubble: #7c5cfc;
      --assistant-bubble: #1e1e1e;
      --danger: #e74c3c;
      --radius: 12px;
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header h1 span { font-size: 22px; }

    .new-chat-btn {
      margin: 12px 16px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
      position: relative;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .chat-item .delete-chat {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      display: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .chat-item:hover .delete-chat { display: block; }
    .chat-item .delete-chat:hover { color: var(--danger); background: rgba(231,76,60,.15); }

    /* ---- Main ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .topbar select {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .topbar select:focus { border-color: var(--accent); }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ---- Messages ---- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
    }
    .welcome-icon { font-size: 48px; }
    .welcome h2 { font-size: 22px; color: var(--text-primary); font-weight: 600; }
    .welcome p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }

    .msg {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-avatar.user { background: var(--accent); }
    .msg-avatar.assistant { background: var(--bg-tertiary); border: 1px solid var(--border); }

    .msg-body {
      flex: 1;
      min-width: 0;
    }
    .msg-role {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .msg-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .msg-content p { margin-bottom: 10px; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content pre {
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .msg-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
    .msg-content :not(pre) > code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
    .msg-content li { margin: 4px 0; }
    .msg-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-secondary);
      margin: 8px 0;
    }
    .msg-content table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
    }
    .msg-content th, .msg-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-size: 13px;
    }
    .msg-content th { background: var(--bg-tertiary); font-weight: 600; }

    .typing-indicator::after {
      content: '▊';
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .msg-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 10px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      animation: fadeIn 0.3s ease;
    }
    .msg-meta .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .msg-meta .meta-val { color: var(--text-primary); font-weight: 600; }
    .context-gauge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 6px;
    }
    .context-gauge-ring {
      --p: 0%;
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--p), #3b3b3b var(--p));
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .context-gauge-ring::before {
      content: "";
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    .context-gauge-value {
      position: absolute;
      font-size: 11px;
      color: var(--text-primary);
      font-weight: 600;
    }
    .context-gauge-label {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ---- Input ---- */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrapper textarea {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 200px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .input-wrapper textarea:focus { border-color: var(--accent); }
    .input-wrapper textarea::placeholder { color: var(--text-secondary); }

    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Constraints ---- */
    .constraints-toggle {
      max-width: 780px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .constraints-toggle button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: inherit;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .constraints-toggle button:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .constraints-toggle button.active { border-color: #f59e0b; color: #f59e0b; }
    .constraints-toggle .indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      display: none;
    }
    .constraints-toggle button.active .indicator { display: inline-block; }

    .constraints-panel {
      max-width: 780px;
      margin: 0 auto 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    .constraints-panel.open { display: block; }
    .constraints-panel .c-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .constraints-panel .c-row:last-child { margin-bottom: 0; }
    .constraints-panel .c-label {
      min-width: 140px;
      font-size: 12px;
      color: #f59e0b;
      padding-top: 7px;
      font-weight: 500;
    }
    .constraints-panel .c-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 32px;
    }
    .constraints-panel .c-input:focus { border-color: var(--accent); }
    .constraints-panel .c-input::placeholder { color: var(--text-secondary); }

    .temp-control { display: flex; align-items: center; gap: 10px; flex: 1; }
    .temp-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      outline: none;
    }
    .temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg-secondary);
      transition: transform 0.15s;
    }
    .temp-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .temp-slider::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg-secondary);
    }
    .temp-value {
      min-width: 32px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .temp-presets { display: flex; gap: 4px; }
    .temp-presets button {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .temp-presets button:hover { border-color: var(--accent); color: var(--text-primary); }
    .temp-presets button.active { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,.1); }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: block; }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 99;
        display: none;
      }
      .overlay.show { display: block; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span>⚡</span> AI Chat Hub</h1>
    </div>
    <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
    <div class="chats-list" id="chatsList"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <label>Модель:</label>
      <select id="modelSelect"></select>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>Добро пожаловать</h2>
        <p>Выберите модель сверху, затем начните разговор. Все чаты сохраняются локально в браузере.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="constraints-toggle">
        <button id="constraintsBtn"><span class="indicator"></span>Ограничения</button>
      </div>
      <div class="constraints-panel" id="constraintsPanel">
        <div class="c-row">
          <div class="c-label">Формат ответа</div>
          <textarea class="c-input" id="cFormat" rows="1" placeholder="Например: отвечай буллет-листом, макс. 3 пункта"></textarea>
        </div>
        <div class="c-row">
          <div class="c-label">Лимит длины</div>
          <textarea class="c-input" id="cLength" rows="1" placeholder="Например: уложись в 100 слов"></textarea>
        </div>
        <div class="c-row">
          <div class="c-label">Стоп-условие</div>
          <textarea class="c-input" id="cStop" rows="1" placeholder='Например: закончи ответ строкой "---END---"'></textarea>
        </div>
        <div class="c-row" style="border-top:1px solid var(--border); padding-top:10px; margin-top:4px;">
          <div class="c-label">Temperature</div>
          <div class="temp-control">
            <input type="range" class="temp-slider" id="tempSlider" min="0" max="2" step="0.1" value="0.7" />
            <span class="temp-value" id="tempValue">0.7</span>
            <div class="temp-presets">
              <button data-t="0">0</button>
              <button data-t="0.7" class="active">0.7</button>
              <button data-t="1.2">1.2</button>
            </div>
          </div>
        </div>
        <div class="c-row" style="border-top:1px solid var(--border); padding-top:10px; margin-top:4px;">
          <div class="c-label">Сжатие истории</div>
          <label style="display:flex; gap:8px; align-items:center; color:var(--text-primary); cursor:pointer;">
            <input type="checkbox" id="compressionToggle" checked />
            <span>Включать summary каждые 10 сообщений</span>
          </label>
        </div>
      </div>
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Напишите сообщение..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="Отправить">➤</button>
      </div>
    </div>
  </main>

<script>
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const $ = s => document.querySelector(s);
const modelSel    = $('#modelSelect');
const messagesEl  = $('#messages');
const welcomeEl   = $('#welcome');
const userInput   = $('#userInput');
const sendBtn     = $('#sendBtn');
const chatsList   = $('#chatsList');
const sidebar     = $('#sidebar');
const overlay     = $('#overlay');

let providerName = '';
let modelList = [];
let chats       = JSON.parse(localStorage.getItem('aichat_chats') || '[]');
let activeChatId = null;
let isStreaming  = false;

function saveChats() { localStorage.setItem('aichat_chats', JSON.stringify(chats)); }
function getChat(id) { return chats.find(c => c.id === id); }

async function init() {
  try {
    const resp = await fetch('/api/models');
    const allModels = await resp.json();
    const providers = Object.keys(allModels);
    if (providers.length) {
      providerName = providers[0];
      modelList = allModels[providerName] || [];
    }
  } catch { modelList = []; }

  modelSel.innerHTML = modelList.map(m =>
    `<option value="${m.id}">${m.label}</option>`
  ).join('');

  modelSel.addEventListener('change', syncChatModel);

  renderChatsList();
  if (chats.length) selectChat(chats[0].id);
}

function syncChatModel() {
  if (!activeChatId) return;
  const chat = getChat(activeChatId);
  if (chat) {
    chat.provider = providerName;
    chat.model = modelSel.value;
    saveChats();
  }
}

// ---- Chat CRUD ----
function createChat() {
  const chat = {
    id: Date.now().toString(),
    title: 'Новый чат',
    provider: providerName,
    model: modelSel.value,
    messages: [],
  };
  chats.unshift(chat);
  saveChats();
  renderChatsList();
  selectChat(chat.id);
  closeSidebar();
}

function deleteChat(id) {
  chats = chats.filter(c => c.id !== id);
  saveChats();
  renderChatsList();
  if (activeChatId === id) {
    activeChatId = null;
    if (chats.length) selectChat(chats[0].id);
    else renderMessages([]);
  }
}

function selectChat(id) {
  activeChatId = id;
  const chat = getChat(id);
  if (!chat) return;

  modelSel.value = chat.model;

  renderChatsList();
  renderMessages(chat.messages);
}

// ---- Render ----
function renderChatsList() {
  chatsList.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" data-id="${c.id}">
      ${escapeHtml(c.title)}
      <button class="delete-chat" data-id="${c.id}" title="Удалить">✕</button>
    </div>
  `).join('');

  chatsList.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('delete-chat')) return;
      selectChat(el.dataset.id);
      closeSidebar();
    });
  });
  chatsList.querySelectorAll('.delete-chat').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      deleteChat(el.dataset.id);
    });
  });
}

function renderMessages(msgs) {
  if (!msgs.length) {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
    return;
  }
  welcomeEl.style.display = 'none';
  messagesEl.innerHTML = msgs.map(m => msgHTML(m.role, m.content, m.meta)).join('');
  scrollDown();
}

function buildMetaHTML(meta) {
  if (!meta) return '';
  const timeSec = (meta.time_ms / 1000).toFixed(1);
  const costStr = meta.cost_rub > 0 ? `${meta.cost_rub.toFixed(6)} ₽` : '0 ₽';
  const totalCostStr = meta.conversation_total_cost_rub > 0
    ? `${meta.conversation_total_cost_rub.toFixed(6)} ₽`
    : '0 ₽';
  const limitPct = meta.prompt_usage_percent !== undefined
    ? `${meta.prompt_usage_percent}%`
    : 'n/a';
  const limitPctNum = Number.isFinite(Number(meta.prompt_usage_percent))
    ? Math.max(0, Math.min(100, Number(meta.prompt_usage_percent)))
    : 0;
  const gaugeHtml = `
    <div class="context-gauge">
      <div class="context-gauge-ring" style="--p:${limitPctNum}%;">
        <span class="context-gauge-value">${Math.round(limitPctNum)}%</span>
      </div>
      <div class="context-gauge-label">
        <span>Контекст</span>
        <span>${meta.prompt_tokens ?? '-'} / ${meta.model_context_limit_tokens ?? '-'}</span>
      </div>
    </div>
  `;
  const summaryInfo = meta.summary_used
    ? `<div class="meta-item">Summary: <span class="meta-val">включен</span> (сжато сообщений: ${meta.compressed_messages_count ?? 0})</div>`
    : '<div class="meta-item">Summary: <span class="meta-val">нет</span></div>';
  const modeInfo = meta.compression_enabled === false
    ? '<div class="meta-item">Режим: <span class="meta-val">без сжатия</span></div>'
    : '<div class="meta-item">Режим: <span class="meta-val">со сжатием</span></div>';
  const compressionInfo = (meta.prompt_tokens_no_compression_est !== undefined && meta.prompt_tokens_with_compression_est !== undefined)
    ? `<div class="meta-item">Промпт без/со сжатием: <span class="meta-val">${meta.prompt_tokens_no_compression_est} / ${meta.prompt_tokens_with_compression_est}</span> (экономия: ${meta.saved_tokens_est ?? 0} ток.)</div>`
    : '';
  return `
    <div class="msg-meta">
      ${gaugeHtml}
      <div class="meta-item">Время: <span class="meta-val">${timeSec}s</span></div>
      <div class="meta-item">Текущий запрос: <span class="meta-val">${meta.current_request_tokens ?? '-'}</span> ток.</div>
      <div class="meta-item">История (до): <span class="meta-val">${meta.history_tokens ?? '-'}</span> ток.</div>
      <div class="meta-item">Summary токены: <span class="meta-val">${meta.summary_tokens ?? 0}</span> ток.</div>
      <div class="meta-item">Recent токены: <span class="meta-val">${meta.recent_history_tokens ?? 0}</span> ток.</div>
      <div class="meta-item">Ответ модели: <span class="meta-val">${meta.response_tokens ?? meta.completion_tokens}</span> ток.</div>
      <div class="meta-item">API токены: <span class="meta-val">${meta.total_tokens}</span> (${meta.prompt_tokens} + ${meta.completion_tokens})</div>
      <div class="meta-item">Лимит контекста: <span class="meta-val">${meta.model_context_limit_tokens ?? '-'}</span> (${limitPct})</div>
      ${modeInfo}
      ${summaryInfo}
      ${compressionInfo}
      <div class="meta-item">Стоимость запроса: <span class="meta-val">${costStr}</span></div>
      <div class="meta-item">Стоимость диалога: <span class="meta-val">${totalCostStr}</span></div>
      <div class="meta-item">Токены диалога (API): <span class="meta-val">${meta.conversation_total_tokens ?? '-'}</span></div>
    </div>
  `;
}

function msgHTML(role, content, meta = null) {
  const avatarClass = role === 'user' ? 'user' : 'assistant';
  const icon = role === 'user' ? '👤' : '🤖';
  const label = role === 'user' ? 'Вы' : 'Ассистент';
  const rendered = role === 'assistant' ? marked.parse(content) : escapeHtml(content).replace(/\n/g, '<br>');
  const metaHtml = role === 'assistant' ? buildMetaHTML(meta) : '';
  return `<div class="msg"><div class="msg-avatar ${avatarClass}">${icon}</div><div class="msg-body"><div class="msg-role">${label}</div><div class="msg-content">${rendered}</div>${metaHtml}</div></div>`;
}

function appendMsg(role) {
  welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.innerHTML = msgHTML(role, '');
  const el = div.firstElementChild;
  messagesEl.appendChild(el);
  scrollDown();
  return el.querySelector('.msg-content');
}

function scrollDown() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Constraints ----
const constraintsBtn = $('#constraintsBtn');
const constraintsPanel = $('#constraintsPanel');
const cFormat = $('#cFormat');
const cLength = $('#cLength');
const cStop = $('#cStop');
const tempSlider = $('#tempSlider');
const tempValue = $('#tempValue');
const tempPresets = document.querySelectorAll('.temp-presets button');
const compressionToggle = $('#compressionToggle');

const storedCompression = localStorage.getItem('aichat_compression_enabled');
if (storedCompression !== null) compressionToggle.checked = storedCompression === '1';

constraintsBtn.addEventListener('click', () => {
  constraintsPanel.classList.toggle('open');
  updateConstraintIndicator();
});

function getSystemPrompt() {
  const parts = [cFormat.value.trim(), cLength.value.trim(), cStop.value.trim()].filter(Boolean);
  return parts.join('\n');
}

function getTemperature() {
  return parseFloat(tempSlider.value);
}

function isCompressionEnabled() {
  return !!compressionToggle.checked;
}

function updateTempPresetHighlight() {
  const val = tempSlider.value;
  tempPresets.forEach(b => b.classList.toggle('active', b.dataset.t === val));
}

tempSlider.addEventListener('input', () => {
  tempValue.textContent = parseFloat(tempSlider.value).toFixed(1);
  updateTempPresetHighlight();
  updateConstraintIndicator();
});

tempPresets.forEach(btn => {
  btn.addEventListener('click', () => {
    tempSlider.value = btn.dataset.t;
    tempValue.textContent = parseFloat(btn.dataset.t).toFixed(1);
    updateTempPresetHighlight();
    updateConstraintIndicator();
  });
});

function updateConstraintIndicator() {
  const hasConstraints = getSystemPrompt().length > 0 || getTemperature() !== 0.7 || !isCompressionEnabled();
  constraintsBtn.classList.toggle('active', hasConstraints);
}
[cFormat, cLength, cStop].forEach(el => el.addEventListener('input', updateConstraintIndicator));
compressionToggle.addEventListener('change', () => {
  localStorage.setItem('aichat_compression_enabled', isCompressionEnabled() ? '1' : '0');
  updateConstraintIndicator();
});

// ---- Send ----
async function send() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  if (!activeChatId) createChat();
  const chat = getChat(activeChatId);

  chat.messages.push({ role: 'user', content: text });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 60) + (text.length > 60 ? '…' : '');
    renderChatsList();
  }

  appendMsg('user').textContent = text;
  userInput.value = '';
  autoResize();

  isStreaming = true;
  sendBtn.disabled = true;
  const contentEl = appendMsg('assistant');
  contentEl.classList.add('typing-indicator');

  const systemPrompt = getSystemPrompt();
  const userForModel = systemPrompt
    ? '[Инструкции для ответа]\n' + systemPrompt + '\n[/Инструкции]\n\n' + text
    : text;
  const apiMessages = [{ role: 'user', content: userForModel }];

  let full = '';
  let meta = null;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: providerName,
        model: chat.model,
        conversation_id: chat.id,
        messages: apiMessages,
        temperature: getTemperature(),
        compression_enabled: isCompressionEnabled(),
      }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += dec.decode(value, { stream: true });

      const lines = buffer.split('\n\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        if (data.startsWith('[META]')) {
          try { meta = JSON.parse(data.slice(6)); } catch {}
          continue;
        }
        if (data.startsWith('[ERROR]')) {
          full += `\n\n**Ошибка:** ${data.slice(8)}`;
          break;
        }
        try { full += JSON.parse(data); } catch { full += data; }
      }
      contentEl.innerHTML = marked.parse(full);
      scrollDown();
    }
  } catch (err) {
    full += `\n\n**Ошибка соединения:** ${err.message}`;
    contentEl.innerHTML = marked.parse(full);
  }

  contentEl.classList.remove('typing-indicator');

  if (meta) {
    const metaEl = document.createElement('div');
    metaEl.innerHTML = buildMetaHTML(meta);
    const renderedMeta = metaEl.firstElementChild;
    if (renderedMeta) contentEl.parentElement.appendChild(renderedMeta);
    scrollDown();
  }

  chat.messages.push({ role: 'assistant', content: full, meta: meta || null });
  saveChats();
  isStreaming = false;
  sendBtn.disabled = false;
  scrollDown();
}

// ---- Textarea auto-resize ----
function autoResize() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
}
userInput.addEventListener('input', autoResize);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
$('#newChatBtn').addEventListener('click', createChat);

// ---- Mobile sidebar ----
$('#hamburger').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
overlay.addEventListener('click', closeSidebar);

init();
</script>
</body>
</html>
