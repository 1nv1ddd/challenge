<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-hover: #2a2a2a;
      --border: #333;
      --text-primary: #e8e8e8;
      --text-secondary: #999;
      --accent: #7c5cfc;
      --accent-hover: #6a4ae0;
      --user-bubble: #7c5cfc;
      --assistant-bubble: #1e1e1e;
      --danger: #e74c3c;
      --radius: 12px;
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header h1 span { font-size: 22px; }

    .new-chat-btn {
      margin: 12px 16px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
      position: relative;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .chat-item .delete-chat {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      display: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .chat-item:hover .delete-chat { display: block; }
    .chat-item .delete-chat:hover { color: var(--danger); background: rgba(231,76,60,.15); }

    /* ---- Main ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .topbar select {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .topbar select:focus { border-color: var(--accent); }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ---- Messages ---- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
    }
    .welcome-icon { font-size: 48px; }
    .welcome h2 { font-size: 22px; color: var(--text-primary); font-weight: 600; }
    .welcome p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }

    .msg {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-avatar.user { background: var(--accent); }
    .msg-avatar.assistant { background: var(--bg-tertiary); border: 1px solid var(--border); }

    .msg-body {
      flex: 1;
      min-width: 0;
    }
    .msg-role {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .msg-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .msg-content p { margin-bottom: 10px; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content pre {
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .msg-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
    .msg-content :not(pre) > code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
    .msg-content li { margin: 4px 0; }
    .msg-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-secondary);
      margin: 8px 0;
    }
    .msg-content table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
    }
    .msg-content th, .msg-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-size: 13px;
    }
    .msg-content th { background: var(--bg-tertiary); font-weight: 600; }

    .typing-indicator::after {
      content: '▊';
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ---- Input ---- */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrapper textarea {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 200px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .input-wrapper textarea:focus { border-color: var(--accent); }
    .input-wrapper textarea::placeholder { color: var(--text-secondary); }

    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: block; }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 99;
        display: none;
      }
      .overlay.show { display: block; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span>⚡</span> AI Chat Hub</h1>
    </div>
    <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
    <div class="chats-list" id="chatsList"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <label>Провайдер:</label>
      <select id="providerSelect"></select>
      <label>Модель:</label>
      <select id="modelSelect"></select>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>Добро пожаловать</h2>
        <p>Выберите провайдер и модель сверху, затем начните разговор. Все чаты сохраняются локально в браузере.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Напишите сообщение..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="Отправить">➤</button>
      </div>
    </div>
  </main>

<script>
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const $ = s => document.querySelector(s);
const providerSel = $('#providerSelect');
const modelSel    = $('#modelSelect');
const messagesEl  = $('#messages');
const welcomeEl   = $('#welcome');
const userInput   = $('#userInput');
const sendBtn     = $('#sendBtn');
const chatsList   = $('#chatsList');
const sidebar     = $('#sidebar');
const overlay     = $('#overlay');

let allModels   = {};
let chats       = JSON.parse(localStorage.getItem('aichat_chats') || '[]');
let activeChatId = null;
let isStreaming  = false;

// ---- Storage helpers ----
function saveChats() { localStorage.setItem('aichat_chats', JSON.stringify(chats)); }
function getChat(id) { return chats.find(c => c.id === id); }

// ---- Init ----
async function init() {
  try {
    const resp = await fetch('/api/models');
    allModels = await resp.json();
  } catch { allModels = {}; }

  const providers = Object.keys(allModels);
  providerSel.innerHTML = providers.map(p =>
    `<option value="${p}">${p.charAt(0).toUpperCase() + p.slice(1)}</option>`
  ).join('');

  if (providers.length) updateModels(providers[0]);

  providerSel.addEventListener('change', () => {
    updateModels(providerSel.value);
    syncChatProvider();
  });
  modelSel.addEventListener('change', syncChatProvider);

  renderChatsList();
  if (chats.length) selectChat(chats[0].id);
}

function updateModels(provider) {
  const models = allModels[provider] || [];
  modelSel.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
}

function syncChatProvider() {
  if (!activeChatId) return;
  const chat = getChat(activeChatId);
  if (chat) {
    chat.provider = providerSel.value;
    chat.model = modelSel.value;
    saveChats();
  }
}

// ---- Chat CRUD ----
function createChat() {
  const provider = providerSel.value;
  const model = modelSel.value;
  const chat = {
    id: Date.now().toString(),
    title: 'Новый чат',
    provider,
    model,
    messages: [],
  };
  chats.unshift(chat);
  saveChats();
  renderChatsList();
  selectChat(chat.id);
  closeSidebar();
}

function deleteChat(id) {
  chats = chats.filter(c => c.id !== id);
  saveChats();
  renderChatsList();
  if (activeChatId === id) {
    activeChatId = null;
    if (chats.length) selectChat(chats[0].id);
    else renderMessages([]);
  }
}

function selectChat(id) {
  activeChatId = id;
  const chat = getChat(id);
  if (!chat) return;

  providerSel.value = chat.provider;
  updateModels(chat.provider);
  modelSel.value = chat.model;

  renderChatsList();
  renderMessages(chat.messages);
}

// ---- Render ----
function renderChatsList() {
  chatsList.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" data-id="${c.id}">
      ${escapeHtml(c.title)}
      <button class="delete-chat" data-id="${c.id}" title="Удалить">✕</button>
    </div>
  `).join('');

  chatsList.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('delete-chat')) return;
      selectChat(el.dataset.id);
      closeSidebar();
    });
  });
  chatsList.querySelectorAll('.delete-chat').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      deleteChat(el.dataset.id);
    });
  });
}

function renderMessages(msgs) {
  if (!msgs.length) {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
    return;
  }
  welcomeEl.style.display = 'none';
  messagesEl.innerHTML = msgs.map(m => msgHTML(m.role, m.content)).join('');
  scrollDown();
}

function msgHTML(role, content) {
  const avatarClass = role === 'user' ? 'user' : 'assistant';
  const icon = role === 'user' ? '👤' : '🤖';
  const label = role === 'user' ? 'Вы' : 'Ассистент';
  const rendered = role === 'assistant' ? marked.parse(content) : escapeHtml(content).replace(/\n/g, '<br>');
  return `<div class="msg"><div class="msg-avatar ${avatarClass}">${icon}</div><div class="msg-body"><div class="msg-role">${label}</div><div class="msg-content">${rendered}</div></div></div>`;
}

function appendMsg(role) {
  welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.innerHTML = msgHTML(role, '');
  const el = div.firstElementChild;
  messagesEl.appendChild(el);
  scrollDown();
  return el.querySelector('.msg-content');
}

function scrollDown() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Send ----
async function send() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  if (!activeChatId) createChat();
  const chat = getChat(activeChatId);

  chat.messages.push({ role: 'user', content: text });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 60) + (text.length > 60 ? '…' : '');
    renderChatsList();
  }

  appendMsg('user').textContent = text;
  userInput.value = '';
  autoResize();

  isStreaming = true;
  sendBtn.disabled = true;
  const contentEl = appendMsg('assistant');
  contentEl.classList.add('typing-indicator');

  let full = '';
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: chat.provider,
        model: chat.model,
        messages: chat.messages,
      }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += dec.decode(value, { stream: true });

      const lines = buffer.split('\n\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        if (data.startsWith('[ERROR]')) {
          full += `\n\n**Ошибка:** ${data.slice(8)}`;
          break;
        }
        full += data;
      }
      contentEl.innerHTML = marked.parse(full);
      scrollDown();
    }
  } catch (err) {
    full += `\n\n**Ошибка соединения:** ${err.message}`;
    contentEl.innerHTML = marked.parse(full);
  }

  contentEl.classList.remove('typing-indicator');
  chat.messages.push({ role: 'assistant', content: full });
  saveChats();
  isStreaming = false;
  sendBtn.disabled = false;
  scrollDown();
}

// ---- Textarea auto-resize ----
function autoResize() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
}
userInput.addEventListener('input', autoResize);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
$('#newChatBtn').addEventListener('click', createChat);

// ---- Mobile sidebar ----
$('#hamburger').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
overlay.addEventListener('click', closeSidebar);

init();
</script>
</body>
</html>
