services:
  app:
    build: .
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://172.28.0.1:11434
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
