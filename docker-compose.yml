services:
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
