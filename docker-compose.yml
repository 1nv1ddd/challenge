services:
  app:
    build: .
    env_file: .env
    environment:
      # Локальная Vikhr через SSH reverse-tunnel — опционально, нужна только если
      # юзер выбирает её в дропдауне моделей. RAG-эмбеддинги от неё больше не зависят.
      - OLLAMA_BASE_URL=http://172.28.0.1:11434
      # RAG-эмбеддинги через облачный RouterAI (default). Tunnel up/down не влияет.
      - RAG_AUTO_BUILD=0
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/00-ratelimit.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env  # TELEGRAM_BOT_TOKEN, ADMIN_TG_IDS
    environment:
      - BACKEND_URL=http://app:8000
    volumes:
      # Тикеты пишутся в data/support_tickets.json — тот же файл читает MCP в app.
      - ./data:/app/data
    depends_on:
      - app
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
