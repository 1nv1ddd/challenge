name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Только то, что нужно review-скрипту: httpx + numpy для cosine/store.
          pip install httpx numpy

      - name: Cache RAG index
        id: rag-cache
        uses: actions/cache@v4
        with:
          path: data/rag_index
          key: rag-index-v1-${{ hashFiles('README.md', 'docs/**', 'CLAUDE.md', 'app/main.py', 'app/payloads.py', 'app/agent/**/*.py', 'app/routers/**/*.py', 'app/rag/**/*.py', 'data/rag_corpus/**', 'nginx*.conf', 'docker-compose.yml') }}

      - name: Build RAG index (cache miss)
        if: steps.rag-cache.outputs.cache-hit != 'true'
        env:
          ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
        run: python scripts/build_rag_index.py

      - name: Get PR diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE..$HEAD" > pr.diff
          echo "diff lines: $(wc -l < pr.diff)"

      - name: Run AI review
        env:
          ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
        run: |
          if [ ! -s pr.diff ]; then
            echo "# 🤖 AI Review" > review.md
            echo "" >> review.md
            echo "Diff пустой — нечего ревьюить." >> review.md
          else
            python scripts/review_pr.py < pr.diff > review.md
          fi
          echo "=== review.md ==="
          cat review.md

      - name: Post / update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Идем по существующим комментариям, обновляем тот, у которого маркер 🤖 AI Review,
          # чтобы каждый push не плодил новые портянки.
          MARKER="# 🤖 AI Review"
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)
          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              -f body="$(cat review.md)"
            echo "Updated existing comment $EXISTING_ID"
          else
            gh pr comment "$PR_NUMBER" --body-file review.md
            echo "Posted new comment"
          fi
